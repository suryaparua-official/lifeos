<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#7F77DD"/>
<title>Surya's Life OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f13;color:#f0f0f0;min-height:100vh;max-width:430px;margin:0 auto;position:relative}
:root{--purple1:#7F77DD;--purple2:#533489;--blue1:#378ADD;--blue2:#185FA5;--green1:#1D9E75;--green2:#0F6E56;--amber1:#EF9F27;--amber2:#BA7517;--pink1:#D4537E;--pink2:#993556;--coral1:#D85A30;--coral2:#993C1D;--card:#1a1a24;--card2:#22222e;--border:#ffffff12;--text:#f0f0f0;--muted:#8888aa;--bg:#0f0f13}
.topbar{position:fixed;top:0;left:0;right:0;max-width:430px;margin:0 auto;z-index:100;background:#0f0f1388;backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:0.5px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.sec-icon-sm{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:600;color:#fff}
.menu-btn{background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;color:var(--muted)}
.nav-drawer{position:fixed;top:57px;left:0;right:0;max-width:430px;margin:0 auto;z-index:99;background:#13131aee;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid var(--border);padding:10px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px}
.nav-btn{display:flex;align-items:center;gap:8px;padding:10px;background:transparent;border:0.5px solid transparent;border-radius:10px;cursor:pointer;font-size:11px;color:var(--text);text-align:left}
.nav-btn.active{background:#ffffff0a;border-color:#ffffff18}
.nav-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;color:#fff;flex-shrink:0}
.page{padding:72px 14px 24px}
.hero{border-radius:20px;padding:20px;margin-bottom:16px;position:relative;overflow:hidden}
.hero-circle1{position:absolute;right:-20px;top:-20px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.07)}
.hero-circle2{position:absolute;left:20px;bottom:-28px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,0.05)}
.sec-header{border-radius:18px;padding:18px 18px 16px;margin-bottom:16px;position:relative;overflow:hidden}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.card-accent{border-width:1px}
.inp{width:100%;border-radius:10px;border:0.5px solid var(--border);padding:9px 12px;font-size:13px;background:var(--card2);color:var(--text);outline:none;font-family:inherit}
.inp:focus{border-color:#ffffff30}
select.inp option{background:#1a1a24}
textarea.inp{resize:vertical;min-height:80px;font-family:inherit}
.gbtn{border:none;border-radius:10px;padding:9px 18px;color:#fff;font-size:13px;font-weight:600;cursor:pointer;width:100%;font-family:inherit}
.obtn{background:transparent;border:0.5px solid var(--border);border-radius:10px;padding:8px 16px;font-size:13px;cursor:pointer;color:var(--muted);font-family:inherit}
.obtn:hover{color:var(--text)}
.pill{font-size:11px;padding:5px 12px;border-radius:20px;border:none;cursor:pointer;font-weight:500;font-family:inherit}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;display:inline-block}
.bar-wrap{height:5px;background:#ffffff12;border-radius:5px;overflow:hidden}
.bar-fill{height:100%;border-radius:5px;transition:width .4s}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{border-radius:14px;padding:14px;position:relative;overflow:hidden;cursor:pointer}
.money-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.money-stat{text-align:center;padding:10px 6px;background:var(--card2);border-radius:12px}
.row-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)}
.avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600;color:#fff;flex-shrink:0}
.form-label{font-size:11px;color:var(--muted);margin:0 0 3px;display:block}
.form-group{margin-bottom:8px}
.flex-row{display:flex;gap:8px}
.range-inp{width:100%;margin-top:8px;accent-color:var(--purple1)}
.empty-state{text-align:center;color:var(--muted);font-size:13px;padding:2rem 0}
.habit-streak{background:linear-gradient(135deg,var(--green1),var(--blue2));border-radius:10px;padding:6px 12px;text-align:center}
.section-hidden{display:none}
.lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.val{font-size:13px;font-weight:500}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="sec-icon-sm" id="topIconEl" style="background:linear-gradient(135deg,#7F77DD,#533489)">⊞</div>
    <span class="topbar-title" id="topTitleEl">Dashboard</span>
  </div>
  <button class="menu-btn" onclick="toggleNav()" id="menuBtn">≡ menu</button>
</div>

<div class="nav-drawer section-hidden" id="navDrawer"></div>
<div class="page" id="pageRoot"></div>

<script>
const SECTIONS=[
  {id:"dashboard",label:"Dashboard",icon:"⊞",g:["#7F77DD","#533489"]},
  {id:"profile",label:"My Profile",icon:"◉",g:["#533489","#D4537E"]},
  {id:"education",label:"Education",icon:"◎",g:["#378ADD","#185FA5"]},
  {id:"career",label:"Career",icon:"▲",g:["#1D9E75","#0F6E56"]},
  {id:"money",label:"Money",icon:"◆",g:["#EF9F27","#BA7517"]},
  {id:"goals",label:"Goals",icon:"◈",g:["#D85A30","#993C1D"]},
  {id:"habits",label:"Habits",icon:"⟳",g:["#1D9E75","#185FA5"]},
  {id:"love",label:"Love & Relations",icon:"♡",g:["#D4537E","#993556"]},
  {id:"achievements",label:"Achievements",icon:"★",g:["#7F77DD","#D4537E"]},
  {id:"dreams",label:"Dreams & Plans",icon:"◇",g:["#533489","#185FA5"]},
  {id:"personal",label:"Personal Life",icon:"❋",g:["#D85A30","#D4537E"]},
];
const SEC=Object.fromEntries(SECTIONS.map(s=>[s.id,s]));

const DEF={
  profile:{name:"Surya",dob:"",bio:"",location:"",phone:"",email:"",blood:"",hobbies:"",languages:"",personality:"",lifeGoal:""},
  education:[],
  career:{skills:[],jobs:[],projects:[]},
  money:{income:[],expenses:[],savings:[]},
  goals:[],
  habits:[],
  love:{status:"",partner:"",anniversary:"",people:[]},
  achievements:[],
  dreams:{bucket:[],plans:{}},
  personal:{memories:[],notes:""}
};

function loadData(){try{const r=localStorage.getItem("surya_lifeos");return r?JSON.parse(r):JSON.parse(JSON.stringify(DEF));}catch{return JSON.parse(JSON.stringify(DEF));}}
function saveData(d){try{localStorage.setItem("surya_lifeos",JSON.stringify(d));}catch{}}

let DATA=loadData();
let SECTION="dashboard";
let NAV_OPEN=false;

function grad(g,dir="135deg"){return`linear-gradient(${dir},${g[0]},${g[1]})`;}
function gradText(g){return`background:${grad(g)};-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;`;}

function update(fn){fn(DATA);saveData(DATA);render();}

function goTo(id){SECTION=id;NAV_OPEN=false;render();}
function toggleNav(){NAV_OPEN=!NAV_OPEN;render();}

function renderNav(){
  const dr=document.getElementById("navDrawer");
  dr.className=NAV_OPEN?"nav-drawer":"nav-drawer section-hidden";
  dr.innerHTML=SECTIONS.map(s=>`
    <button class="nav-btn${SECTION===s.id?" active":""}" onclick="goTo('${s.id}')">
      <div class="nav-icon" style="background:${grad(s.g)}">${s.icon}</div>
      <span>${s.label}</span>
    </button>`).join("");
}

function renderTopBar(){
  const s=SEC[SECTION];
  document.getElementById("topIconEl").style.background=grad(s.g);
  document.getElementById("topIconEl").textContent=s.icon;
  document.getElementById("topTitleEl").textContent=s.label;
  document.getElementById("menuBtn").textContent=NAV_OPEN?"✕ close":"≡ menu";
}

// ── Helpers ───────────────────────────────────────
function card(content,accentColor=""){
  const border=accentColor?`border-color:${accentColor}44;border-width:1px`:"";
  return`<div class="card" style="${border}">${content}</div>`;
}
function inp(id,placeholder,value="",type="text",extraStyle=""){
  return`<input id="${id}" type="${type}" class="inp" placeholder="${placeholder}" value="${value||""}" style="${extraStyle}">`;
}
function sel(id,options,value=""){
  return`<select id="${id}" class="inp">${options.map(o=>`<option value="${o}"${value===o?" selected":""}>${o}</option>`).join("")}</select>`;
}
function gbtn(label,onclick,g,extraStyle=""){
  return`<button class="gbtn" style="background:${grad(g)};${extraStyle}" onclick="${onclick}">${label}</button>`;
}
function obtn(label,onclick,extraStyle=""){
  return`<button class="obtn" style="${extraStyle}" onclick="${onclick}">${label}</button>`;
}
function tag(label,color){return`<span class="tag" style="background:${color}22;color:${color}">${label}</span>`;}
function bar(pct,g){return`<div class="bar-wrap"><div class="bar-fill" style="width:${Math.min(100,pct||0)}%;background:${grad(g,'90deg')}"></div></div>`;}
function secHeader(sec){
  return`<div class="sec-header" style="background:${grad(sec.g)}">
    <div style="position:absolute;right:-15px;top:-15px;width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,0.08)"></div>
    <div style="position:absolute;right:30px;bottom:-20px;width:50px;height:50px;border-radius:50%;background:rgba(255,255,255,0.05)"></div>
    <p style="font-size:22px;margin:0 0 4px;color:rgba(255,255,255,0.7)">${sec.icon}</p>
    <p style="font-size:18px;font-weight:600;margin:0;color:#fff">${sec.label}</p>
  </div>`;
}
function formGroup(label,inputHtml){return`<div class="form-group"><label class="form-label">${label}</label>${inputHtml}</div>`;}

// ── Pages ─────────────────────────────────────────
function pageDashboard(){
  const p=DATA.profile;
  const totalGoals=DATA.goals.length;
  const avgGoal=totalGoals?Math.round(DATA.goals.reduce((a,g)=>a+(g.progress||0),0)/totalGoals):0;
  const totalIncome=DATA.money.income.reduce((a,i)=>a+(Number(i.amount)||0),0);
  const totalExp=DATA.money.expenses.reduce((a,e)=>a+(Number(e.amount)||0),0);
  const balance=totalIncome-totalExp;
  const lifeScore=Math.round(avgGoal*0.4+Math.min(100,DATA.achievements.length*8)*0.3+(DATA.habits.filter(h=>h.streak>0).length/(DATA.habits.length||1))*100*0.3);
  const dateStr=new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

  const stats=[
    {label:"Goals",val:totalGoals,sec:"goals"},
    {label:"Habits",val:DATA.habits.length,sec:"habits"},
    {label:"Wins",val:DATA.achievements.length,sec:"achievements"},
    {label:"Balance",val:"₹"+balance.toLocaleString("en-IN"),sec:"money"},
  ];

  let html=`
  <div class="hero" style="background:${grad(["#7F77DD","#185FA5"])}">
    <div class="hero-circle1"></div><div class="hero-circle2"></div>
    <p style="font-size:11px;color:rgba(255,255,255,0.55);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px">Welcome back</p>
    <p style="font-size:26px;font-weight:700;color:#fff;margin:0 0 2px">${p.name||"Surya"} ✦</p>
    <p style="font-size:12px;color:rgba(255,255,255,0.55);margin:0 0 14px">${dateStr}</p>
    <div style="background:rgba(255,255,255,0.13);border-radius:12px;padding:11px 14px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-size:11px;color:rgba(255,255,255,0.7)">Life score</span>
        <span style="font-size:12px;color:#fff;font-weight:600">${lifeScore}%</span>
      </div>
      <div style="height:6px;background:rgba(255,255,255,0.2);border-radius:6px;overflow:hidden">
        <div style="height:100%;width:${lifeScore}%;background:linear-gradient(90deg,rgba(255,255,255,0.5),#fff);border-radius:6px;transition:width .5s"></div>
      </div>
    </div>
  </div>

  <div class="stat-grid">
    ${stats.map(m=>{const g=SEC[m.sec].g;return`
    <div class="stat-card" style="background:linear-gradient(135deg,${g[0]}18,${g[1]}30);border:1px solid ${g[0]}33" onclick="goTo('${m.sec}')">
      <div style="position:absolute;right:-8px;top:-8px;width:40px;height:40px;border-radius:50%;background:${g[0]}18"></div>
      <p class="lbl">${m.label}</p>
      <p style="font-size:22px;font-weight:700;margin:0;${gradText(g)}">${m.val}</p>
    </div>`;}).join("")}
  </div>`;

  // Goals
  html+=card(`<p style="font-size:13px;font-weight:600;margin:0 0 12px;color:#D85A30">Goals tracker</p>`+
    (DATA.goals.length===0?`<p style="font-size:12px;color:var(--muted)">No goals yet.</p>`:
    DATA.goals.slice(0,3).map(g=>`
      <div style="margin-bottom:12px">
        <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
          <span style="font-weight:500">${g.name}</span><span style="color:#D85A30;font-weight:600">${g.progress||0}%</span>
        </div>
        ${bar(g.progress||0,SEC.goals.g)}
        ${g.deadline?`<p style="font-size:11px;color:var(--muted);margin:3px 0 0">Due: ${g.deadline}</p>`:""}
      </div>`).join("")),"#D85A30");

  // Habits
  html+=card(`<p style="font-size:13px;font-weight:600;margin:0 0 12px;color:#1D9E75">Habits today</p>`+
    (DATA.habits.length===0?`<p style="font-size:12px;color:var(--muted)">No habits yet.</p>`:
    DATA.habits.slice(0,4).map(h=>`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1D9E7522,#185FA533);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0">${h.icon||"⟳"}</div>
        <div style="flex:1"><p style="font-size:13px;font-weight:500;margin:0">${h.name}</p><p style="font-size:11px;color:var(--muted);margin:0">${h.category}</p></div>
        <div class="habit-streak"><p style="font-size:16px;font-weight:700;margin:0;color:#fff">${h.streak||0}</p><p style="font-size:9px;color:rgba(255,255,255,0.7);margin:0">days</p></div>
      </div>`).join("")),"#1D9E75");

  // Money
  html+=card(`<p style="font-size:13px;font-weight:600;margin:0 0 10px;color:#EF9F27">Money snapshot</p>
    <div class="money-grid">
      ${[{l:"Income",v:totalIncome,c:"#1D9E75"},{l:"Spent",v:totalExp,c:"#D85A30"},{l:"Balance",v:balance,c:balance>=0?"#185FA5":"#D4537E"}].map(m=>`
      <div class="money-stat" style="border:1px solid ${m.c}22">
        <p class="lbl">${m.l}</p>
        <p style="font-size:13px;font-weight:600;margin:0;color:${m.c}">₹${Math.abs(m.v).toLocaleString("en-IN")}</p>
      </div>`).join("")}
    </div>`,"#EF9F27");

  if(DATA.achievements.length>0){
    const a=DATA.achievements[DATA.achievements.length-1];
    html+=card(`<p style="font-size:13px;font-weight:600;margin:0 0 8px;color:#7F77DD">Latest win</p>
      <div style="display:flex;gap:10px;align-items:center">
        <div style="width:32px;height:32px;border-radius:8px;background:${grad(SEC.achievements.g)};display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0">★</div>
        <p style="font-size:13px;font-weight:500;margin:0">${a.title}</p>
      </div>`,"#7F77DD");
  }
  return html;
}

function pageProfile(){
  const p=DATA.profile;
  const g=SEC.profile.g;
  const editing=window._profileEditing;
  let html=secHeader(SEC.profile);
  html+=card(`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      <div class="avatar" style="width:56px;height:56px;font-size:22px;background:${grad(g)}">${(p.name||"S").charAt(0).toUpperCase()}</div>
      <div>
        <p style="font-size:17px;font-weight:600;margin:0">${p.name||"Your Name"}</p>
        <p style="font-size:12px;color:var(--muted);margin:2px 0 0">${p.location||"Location not set"}</p>
      </div>
    </div>
    ${p.bio?`<div style="background:var(--card2);border-radius:10px;padding:10px 12px;margin-bottom:10px"><p style="font-size:13px;margin:0;line-height:1.6;color:var(--muted)">${p.bio}</p></div>`:""}
    ${p.lifeGoal?`<div style="background:linear-gradient(135deg,${g[0]}12,${g[1]}20);border:1px solid ${g[0]}33;border-radius:10px;padding:10px 12px;margin-bottom:10px">
      <p style="font-size:11px;color:${g[0]};font-weight:600;margin:0 0 3px;text-transform:uppercase;letter-spacing:0.5px">Life goal</p>
      <p style="font-size:13px;margin:0">${p.lifeGoal}</p></div>`:""}
    ${[["Date of birth",p.dob],["Phone",p.phone],["Email",p.email],["Blood group",p.blood],["Languages",p.languages],["Personality",p.personality],["Hobbies",p.hobbies]].filter(r=>r[1]).map(r=>`
      <div class="row-item"><span style="font-size:12px;color:var(--muted)">${r[0]}</span><span style="font-size:13px;font-weight:500;max-width:60%;text-align:right">${r[1]}</span></div>`).join("")}`);

  if(editing){
    html+=card(`
      ${formGroup("Full name",inp("pf_name","Full name",p.name))}
      ${formGroup("Date of birth",inp("pf_dob","","",p.dob,"date"))}
      ${formGroup("Location",inp("pf_loc","City, State",p.location))}
      ${formGroup("Phone",inp("pf_phone","Phone number",p.phone,"tel"))}
      ${formGroup("Email",inp("pf_email","Email",p.email,"email"))}
      ${formGroup("Blood group",inp("pf_blood","e.g. O+",p.blood))}
      ${formGroup("Languages",inp("pf_lang","e.g. Bengali, English",p.languages))}
      ${formGroup("Personality type",inp("pf_pers","e.g. INTJ, Ambivert",p.personality))}
      ${formGroup("Hobbies",inp("pf_hobbies","e.g. Gaming, Music",p.hobbies))}
      ${formGroup("Life goal",inp("pf_goal","Your biggest life goal",p.lifeGoal))}
      ${formGroup("Bio / About me",`<textarea id="pf_bio" class="inp" placeholder="Write about yourself...">${p.bio||""}</textarea>`)}
      <div class="flex-row" style="margin-top:4px">
        ${gbtn("Save profile","saveProfile()",g)}
        ${obtn("Cancel","cancelProfileEdit()")}
      </div>`);
  } else {
    html+=gbtn("Edit profile","editProfile()",g);
  }
  return html;
}

function pageEducation(){
  const g=SEC.education.g;
  let html=secHeader(SEC.education);
  const LEVELS=["Select level","Madhyamik","Higher Secondary","Diploma","Bachelor's","Master's","PhD","Certificate","Other"];
  if(DATA.education.length===0&&!window._eduAdding) html+=`<p class="empty-state">Add your educational background.</p>`;
  DATA.education.forEach((e,i)=>{
    html+=card(`
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div>
          <p style="font-size:14px;font-weight:600;margin:0">${e.level}</p>
          ${e.field?`<p style="font-size:12px;color:var(--muted);margin:2px 0 0">${e.field}</p>`:""}
        </div>
        ${tag(e.status,g[0])}
      </div>
      ${e.institute?`<p style="font-size:13px;font-weight:500;margin:4px 0 2px">${e.institute}</p>`:""}
      ${e.board?`<p style="font-size:12px;color:var(--muted);margin:2px 0">${e.board}</p>`:""}
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:6px">
        ${e.year?tag(e.year+(e.endYear&&e.endYear!==e.year?" – "+e.endYear:""),"#888888"):""}
        ${e.result?tag("Result: "+e.result,g[1]):""}
      </div>
      ${obtn("Remove","delEdu("+i+")","margin-top:10px;font-size:11px;padding:4px 10px")}`,g[0]);
  });
  if(window._eduAdding){
    html+=card(`
      ${formGroup("Level",sel("edu_level",LEVELS,window._eduForm?.level||""))}
      ${formGroup("Institute / School / College",inp("edu_inst","e.g. Jadavpur University",window._eduForm?.institute))}
      ${formGroup("Board / University",inp("edu_board","e.g. WBBSE, WBCHSE",window._eduForm?.board))}
      ${formGroup("Field / Subject",inp("edu_field","e.g. Computer Science",window._eduForm?.field))}
      <div class="flex-row">
        <div style="flex:1">${formGroup("Start year",inp("edu_year","2020",window._eduForm?.year))}</div>
        <div style="flex:1">${formGroup("End year",inp("edu_end","2022",window._eduForm?.endYear))}</div>
      </div>

    html+=card(`
      <div style="display:flex;justify-content:space-between;align-items:flex-start">
        <div><p style="font-size:14px;font-weight:600;margin:0">${m.title}</p><p style="font-size:11px;color:var(--muted);margin:2px 0 6px">${m.date}</p></div>
        <div style="display:flex;gap:6px;align-items:center">
          ${m.mood?`<span style="font-size:16px">${m.mood.split(" ")[0]}</span>`:""}
          ${obtn("×","delMemory("+i+")","font-size:13px;padding:4px 8px")}
        </div>
      </div>
      ${m.note?`<p style="font-size:13px;color:var(--muted);margin:0;line-height:1.5">${m.note}</p>`:""}`,g[0]);
  });
  if(window._memoryAdding){
    html+=card(`
      ${formGroup("Memory title",inp("mem_title","What happened?"))}
      ${formGroup("Details",inp("mem_note","Tell the story..."))}
      ${formGroup("Mood",sel("mem_mood",MOODS))}
      <div class="flex-row">${gbtn("Save","saveMemory()",g)}${obtn("Cancel","cancelMemory()")}</div>`);
  } else {
    html+=gbtn("+ Add memory","startMemoryAdd()",g);
  }
  return html;
}

// ── Render ────────────────────────────────────────
function render(){
  renderTopBar();
  renderNav();
  const root=document.getElementById("pageRoot");
  const pages={dashboard:pageDashboard,profile:pageProfile,education:pageEducation,career:pageCareer,money:pageMoney,goals:pageGoals,habits:pageHabits,love:pageLove,achievements:pageAchievements,dreams:pageDreams,personal:pagePersonal};
  root.innerHTML=pages[SECTION]?pages[SECTION]():`<p class="empty-state">Coming soon.</p>`;
}

// ── Actions ──────────────────────────────────────
// Profile
function editProfile(){window._profileEditing=true;render();}
function cancelProfileEdit(){window._profileEditing=false;render();}
function saveProfile(){
  const p=DATA.profile;
  ["name","dob","location","phone","email","blood","languages","personality","hobbies","lifeGoal"].forEach(k=>{
    const el=document.getElementById("pf_"+k.toLowerCase().replace("lifegoal","goal"));
    if(el)p[k]=el.value;
  });
  const bioEl=document.getElementById("pf_bio");if(bioEl)p.bio=bioEl.value;
  window._profileEditing=false;saveData(DATA);render();
}
// Education
function startEduAdd(){window._eduAdding=true;window._eduForm={};render();}
function cancelEdu(){window._eduAdding=false;render();}
function saveEdu(){
  const level=document.getElementById("edu_level")?.value;
  if(!level||level==="Select level")return;
  DATA.education.push({level,institute:v("edu_inst"),board:v("edu_board"),field:v("edu_field"),year:v("edu_year"),endYear:v("edu_end"),result:v("edu_result"),status:v("edu_status")||"Completed"});
  window._eduAdding=false;saveData(DATA);render();
}
function delEdu(i){DATA.education.splice(i,1);saveData(DATA);render();}
// Career
function setCareerTab(t){window._careerTab=t;window._careerAdding=false;render();}
function startCareerAdd(){window._careerAdding=true;render();}
function cancelCareer(){window._careerAdding=false;render();}
function saveCareer(){
  const tab=window._careerTab||"jobs";const name=v("c_name");if(!name)return;
  if(tab==="jobs") DATA.career.jobs.push({role:name,company:v("c_company"),type:v("c_type")||"Full-time",location:v("c_loc"),from:v("c_from"),to:v("c_to"),salary:v("c_salary"),salaryType:v("c_saltype")||"Monthly",desc:v("c_desc")});
  if(tab==="skills") DATA.career.skills.push({name,category:v("c_cat")||"Technical",level:v("c_level")||"Intermediate"});
  if(tab==="projects") DATA.career.projects.push({name,desc:v("c_desc"),tech:v("c_tech"),status:v("c_status")||"Active"});
  window._careerAdding=false;saveData(DATA);render();
}
function delCareer(arr,i){DATA.career[arr].splice(i,1);saveData(DATA);render();}
// Money
function setMoneyTab(t){window._moneyTab=t;window._moneyAdding=false;render();}
function startMoneyAdd(){window._moneyAdding=true;render();}
function cancelMoney(){window._moneyAdding=false;render();}
function saveMoney(){
  const tab=window._moneyTab||"income";const name=v("m_name");const amount=v("m_amount");if(!name||!amount)return;
  const item={name,amount:Number(amount),category:v("m_cat")||"Other",date:new Date().toLocaleDateString("en-IN"),note:v("m_note")};
  if(tab==="savings")item.goal=Number(v("m_goal")||0);
  DATA.money[tab].push(item);window._moneyAdding=false;saveData(DATA);render();
}
function delMoney(tab,i){DATA.money[tab].splice(i,1);saveData(DATA);render();}
// Goals
function startGoalAdd(){window._goalAdding=true;render();}
function cancelGoal(){window._goalAdding=false;render();}
function saveGoal(){
  const name=v("goal_name");if(!name)return;
  DATA.goals.push({name,category:v("goal_cat")||"Personal",why:v("goal_why"),deadline:v("goal_dl"),progress:0});
  window._goalAdding=false;saveData(DATA);render();
}
function updateGoalProgress(i,val){DATA.goals[i].progress=Number(val);saveData(DATA);document.querySelectorAll(".bar-fill")[i]&&(document.querySelectorAll(".bar-fill")[i].style.width=val+"%");}
function delGoal(i){DATA.goals.splice(i,1);saveData(DATA);render();}
// Habits
const HICONS={Health:"💊",Learning:"📚",Fitness:"🏋️",Mindfulness:"🧘",Productivity:"⚡",Social:"👥",Finance:"💰",Other:"⟳"};
function startHabitAdd(){window._habitAdding=true;render();}
function cancelHabit(){window._habitAdding=false;render();}
function saveHabit(){
  const name=v("h_name");if(!name)return;
  const cat=v("h_cat")||"Other";
  DATA.habits.push({name,category:cat,freq:v("h_freq")||"Daily",icon:HICONS[cat]||"⟳",streak:0,why:v("h_why")});
  window._habitAdding=false;saveData(DATA);render();
}
function markHabit(i){DATA.habits[i].streak=(DATA.habits[i].streak||0)+1;saveData(DATA);render();}
function delHabit(i){DATA.habits.splice(i,1);saveData(DATA);render();}
// Love
function editLoveStatus(){window._loveEditing=true;render();}
function cancelLoveEdit(){window._loveEditing=false;render();}
function saveLoveStatus(){DATA.love.status=v("love_status");DATA.love.partner=v("love_partner");DATA.love.anniversary=v("love_anni");window._loveEditing=false;saveData(DATA);render();}
function startLovePerson(){window._loveAddPerson=true;render();}
function cancelLovePerson(){window._loveAddPerson=false;render();}
function saveLovePerson(){const name=v("lp_name");if(!name)return;DATA.love.people.push({name,rel:v("lp_rel")||"Friend",birthday:v("lp_bday"),note:v("lp_note")});window._loveAddPerson=false;saveData(DATA);render();}
function delLovePerson(i){DATA.love.people.splice(i,1);saveData(DATA);render();}
// Achievements
function startAchAdd(){window._achAdding=true;render();}
function cancelAch(){window._achAdding=false;render();}
function saveAch(){const title=v("ach_title");if(!title)return;DATA.achievements.push({title,category:v("ach_cat")||"Personal",desc:v("ach_desc"),date:new Date().toLocaleDateString("en-IN")});window._achAdding=false;saveData(DATA);render();}
function delAch(i){DATA.achievements.splice(i,1);saveData(DATA);render();}
// Dreams
function setDreamsTab(t){window._dreamsTab=t;window._dreamsAdding=false;render();}
function startDreamAdd(){window._dreamsAdding=true;render();}
function cancelDream(){window._dreamsAdding=false;render();}
function saveDream(){
  const name=v("dr_name");if(!name)return;
  const tab=window._dreamsTab||"bucket";
  if(tab==="bucket")DATA.dreams.bucket.push({name,category:v("dr_cat"),done:false});
  else{const h=v("dr_horizon")||"1-year";if(!DATA.dreams.plans[h])DATA.dreams.plans[h]=[];DATA.dreams.plans[h].push(name);}
  window._dreamsAdding=false;saveData(DATA);render();
}
function toggleBucket(i){DATA.dreams.bucket[i].done=!DATA.dreams.bucket[i].done;saveData(DATA);render();}
// Personal
function editPersonalNotes(){window._personalNotesEdit=true;render();}
function cancelPersonalNotes(){window._personalNotesEdit=false;render();}
function savePersonalNotes(){DATA.personal.notes=document.getElementById("pnotes")?.value||"";window._personalNotesEdit=false;saveData(DATA);render();}
function startMemoryAdd(){window._memoryAdding=true;render();}
function cancelMemory(){window._memoryAdding=false;render();}
function saveMemory(){const title=v("mem_title");if(!title)return;DATA.personal.memories.push({title,note:v("mem_note"),mood:v("mem_mood"),date:new Date().toLocaleDateString("en-IN")});window._memoryAdding=false;saveData(DATA);render();}
function delMemory(i){DATA.personal.memories.splice(i,1);saveData(DATA);render();}

function v(id){const el=document.getElementById(id);return el?el.value:"";}

render();
</script>
</body>
</html>
